name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:  # bisa trigger manual dari GitHub UI

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Build & deploy frontend ke Cloudflare Pages
  # ──────────────────────────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: mental-health-predictor
          directory: frontend/dist
          # Optional: gitHubToken tidak diperlukan untuk deploy biasa

  # ──────────────────────────────────────────────
  # Job 2: SSH ke VPS, pull, rebuild backend
  # ──────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    needs: []  # jalan paralel dengan frontend, hapus baris ini kalau mau sequential
    steps:
      - name: SSH deploy ke VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/mental-health
            git pull origin main
            docker compose build --no-cache
            docker compose up -d
            echo "Menunggu health check..."
            sleep 5
            curl -sf http://localhost:8000/api/health && echo " ✅ Backend OK" || echo " ❌ Backend gagal"
