name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Upload models & dataset ke HuggingFace
  # ──────────────────────────────────────────────
  deploy-huggingface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -q huggingface-hub

      - name: Upload models to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')

          # Upload model files
          for f in ['model_lr_v3.pkl', 'model_xgb_v3.pkl', 'model_lgbm_v3.pkl',
                    'scaler_v3.pkl', 'features_v3.pkl', 'medians_v3.pkl']:
              api.upload_file(
                  path_or_fileobj='models/' + f,
                  path_in_repo=f,
                  repo_id='adeputr4/mental-health-gaming-predictor',
                  repo_type='model',
              )

          # Upload model card
          api.upload_file(
              path_or_fileobj='README_HF.md',
              path_in_repo='README.md',
              repo_id='adeputr4/mental-health-gaming-predictor',
              repo_type='model',
          )
          print('Models uploaded!')
          "

      - name: Upload dataset to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
          from huggingface_hub import HfApi
          api = HfApi(token='$HF_TOKEN')

          # Upload dataset card only (CSV too large, upload once manually via make hf-upload-dataset)
          api.upload_file(
              path_or_fileobj='README_DATASET.md',
              path_in_repo='README.md',
              repo_id='adeputr4/mental-health-gaming-dataset',
              repo_type='dataset',
          )
          print('Dataset card uploaded!')
          "

  # ──────────────────────────────────────────────
  # Job 2: SSH ke VPS, pull, rebuild backend
  # ──────────────────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy ke VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/clawuser/mental-health-prediction
            git stash --include-untracked 2>/dev/null || true
            git pull --rebase origin main || git pull origin main
            docker stop mental-health-api 2>/dev/null || true
            docker rm -f mental-health-api 2>/dev/null || true
            docker-compose build
            docker run -d \
              --name mental-health-api \
              --restart unless-stopped \
              -p 7500:8000 \
              --env-file .env \
              mental-health-prediction_backend
            echo "Menunggu health check..."
            sleep 10
            curl -sf http://localhost:7500/api/health && echo " ✅ Backend OK" || echo " ❌ Backend gagal"
