global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI backend metrics
  - job_name: 'mental-health-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['172.17.0.1:7500']
        labels:
          service: 'backend'
          project: 'mental-health-prediction'

  # Node exporter (system metrics)
  - job_name: 'node'
    static_configs:
      - targets: ['172.17.0.1:9100']
        labels:
          service: 'vps'
          project: 'mental-health-prediction'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
